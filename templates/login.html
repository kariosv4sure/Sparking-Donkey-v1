{% extends "base.html" %}

{% block title %}Login · Sparkling Donkey{% endblock %}

{% set show_header = False %}

{% block content %}
<div class="auth-page">
    <div class="auth-container">
        <div class="logo">
            <span class="gold">✦</span> Sparkling Donkey
        </div>
        <div class="auth-card">
            <h2>Invitation Only</h2>
            <p class="auth-subtitle">Two seats. One screen. Perfect sync.</p>
            <form method="POST">
                <div class="input-group">
                    <input type="text" name="username" placeholder="Username" required autofocus>
                </div>
                <div class="input-group">
                    <input type="password" name="password" placeholder="Password" required>
                </div>
                {% if error %}
                <div class="error">{{ error }}</div>
                {% endif %}
                <button type="submit" class="btn-gold">Enter the Room</button>
            </form>
        </div>
        <div class="auth-footer">
            <span class="gold-dot"></span> Only two users. Ever.
        </div>
    </div>
</div>
{% endblock %}
